server {
    listen 80;
    server_name localhost;

    # Att använda alias gör att Nginx inte lägger till "/news" 
    # till sökvägen på disken, vilket undviker "mapp i mappen"-problemet.
    location /news/ {
        alias /usr/share/nginx/html/news/;
        index index.html;
        try_files $uri $uri/ /news/index.html;
    }

    # Standard-felhantering
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}